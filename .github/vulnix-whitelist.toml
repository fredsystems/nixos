# vulnix whitelist for this flake's CVE scan
# ============================================
#
# This file lists packages and CVEs that should NOT appear in the CVE
# report issue. Format reference:
#   https://github.com/nix-community/vulnix#whitelisting
#
# Each [section] header selects a package:
#   ["foo-1.2.3"]   exact name and version (most precise; preferred)
#   ["foo"]         all versions of this name (use only for permanent
#                   namespace collisions — see category 1 below)
# Within a section:
#   cve       = ["CVE-..."]   only mute these specific CVEs (others still report)
#   until     = "YYYY-MM-DD"  rule auto-expires on this date
#   issue_url = "..."         link to tracking issue (informational)
#   comment   = "..."         free text (informational)
#
# IMPORTANT: vulnix matches the bare `name` field (no language prefix), so
# a Rust crate called `curl` and the C library `curl` are indistinguishable
# by name alone. We disambiguate them by version — but versions change, so
# version-pinned entries below will need refreshing when nixpkgs bumps the
# crate. The CI report will start re-flagging them when that happens, which
# is the cue to update this file.
#
# Whitelist entries fall into a few categories. PLEASE keep them grouped
# and commented — a year from now we'll need to remember why each one is
# here, and "no comment" entries get flagged for re-review.
#
#   1. Namespace collisions: vulnix matches by name+version against NVD,
#      but Nix has many packages whose names collide with unrelated
#      upstream products. The Rust crate `curl 0.4.x` is not the C library
#      `curl 8.x`. The Haskell `Diff 1.0.x` is not Microsoft Diffview.
#      Mute these by exact version. When the crate bumps, the new version
#      will reappear in the report and we update this file.
#
#   2. Accepted risks (CVE acknowledged, fix deferred). MUST have an
#      `issue_url` and `until` date. Re-evaluated on expiry.
#
#   3. Backported fixes that vulnix's CVE-patch auto-detection missed
#      (e.g. patch filename doesn't include the CVE ID). MUST have an
#      `issue_url` linking to the nixpkgs PR/commit that backports the fix.
#
# ============================================================================
# 1. Namespace collisions (false positives)
# ============================================================================

# Rust `curl` crate (HTTP bindings) — NOT the C library libcurl 8.x.
# Drop these entries when nixpkgs bumps the crate; the new version will
# reappear in the report as a re-confirmation prompt.
["curl-0.4.46"]
comment = "Rust HTTP-bindings crate, not the C library libcurl"

["curl-0.4.49"]
comment = "Rust HTTP-bindings crate, not the C library libcurl"

# Haskell `glib` (gtk2hs low-level GObject bindings) — NOT GNOME GLib 2.x.
["glib-0.20.12"]
comment = "Haskell gtk2hs GObject bindings, not GNOME GLib"

# Rust `discord` crate (unmaintained API client) — NOT the Discord desktop app.
["discord-0.0.134"]
comment = "Rust Discord-API crate, not the Discord desktop application"

# Haskell `Diff` (Wagner-Fischer string diff) — NOT Microsoft Diff/diffview.
# Note the capital D distinguishes it from the unrelated `diff-0.1.13`
# Rust crate (also a false positive against GNU diffutils, but listed
# separately to keep the comment trail explicit).
["Diff-1.0.2"]
comment = "Haskell text-diff library, not Microsoft Diff"

["diff-0.1.13"]
comment = "Rust diff crate, not GNU diffutils"

