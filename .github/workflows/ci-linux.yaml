---
name: CI (Linux)

on:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # =====================================================================
  # Fast-path: MUST ALWAYS RUN or downstream jobs will skip
  # =====================================================================
  skip-if-clean:
    name: Skip if merge_queue produces no diff
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Merge Queue CI Check Skipper
        id: merge-queue-ci-skipper
        uses: ./.github/merge-queue-ci-skipper
        with:
          secret: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Check merge_group synthetic commit
        id: check
        run: |
          # PR mode: never skip
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ steps.merge-queue-ci-skipper.outputs.skip-check }}" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # =====================================================================
  # Discover Linux systems
  # =====================================================================
  find-systems:
    name: Find Linux systems
    runs-on: ubuntu-latest
    needs: [skip-if-clean]
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}

    outputs:
      servers: ${{ steps.out.outputs.servers }}
      desktops: ${{ steps.out.outputs.desktops }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Detect which paths changed so we can scope builds to affected
      # systems only.  Runs for both pull_request and merge_group events.
      # workflow_dispatch always builds every system (no diff context).
      #
      # We use plain git-diff instead of dorny/paths-filter because the
      # latter treats negation patterns (e.g. '!features/desktop/**') as
      # independent picomatch matchers, causing the global filter to match
      # virtually every file.
      #
      # When flake.lock changes, we parse the diff to determine which
      # inputs actually changed and map them to CI categories instead of
      # blindly rebuilding everything.  See agents.md for the full
      # input-to-category mapping and maintenance rules.
      - name: Detect changed paths
        id: changes
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          set -eo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.merge_group.base_sha }}"
          fi

          echo "Comparing ${base_sha}..HEAD"
          changed_files=$(git diff --name-only "$base_sha" HEAD)
          echo "Changed files:"
          echo "$changed_files"

          global=false
          desktop_global=false
          server_global=false
          flake_lock_changed=false
          machine_files_arr=()

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              flake.nix|firmware.nix)
                global=true ;;
              flake.lock)
                flake_lock_changed=true ;;
              modules/*|profiles/*|home-profiles/*|dotfiles/*)
                global=true ;;
              features/desktop/*)
                desktop_global=true ;;
              features/*)
                global=true ;;
              .github/renovate.json5)
                ;; # excluded from global
              .github/*)
                global=true ;;
              hosts/linux/*)
                machine_files_arr+=("$file") ;;
            esac
          done <<< "$changed_files"

          # ----------------------------------------------------------------
          # Input-aware flake.lock filtering
          #
          # Instead of treating any flake.lock change as global, compare
          # the locked revision of each root input between base and HEAD
          # and map changed inputs to their CI category.
          #
          # Category map — keep in sync with flake.nix CI comments and
          # the table in agents.md.  Unknown inputs default to "global".
          # ----------------------------------------------------------------
          if [ "$flake_lock_changed" = "true" ] && [ "$global" = "false" ]; then
            echo ""
            echo "flake.lock changed — parsing input diff..."

            old_lock=$(git show "${base_sha}:flake.lock" 2>/dev/null || echo '{}')
            new_lock=$(cat flake.lock)

            # Associative array: input name → CI category
            declare -A input_category=(
              [nixpkgs]="desktop+fredhub"
              [home-manager]="desktop"
              [catppuccin]="desktop"
              [niri]="desktop"
              [fredbar]="desktop"
              [freminal]="desktop"
              [solaar]="desktop"
              [apple-fonts]="desktop"
              [walls-catppuccin]="desktop"
              [nixvim]="desktop"
              [sops-nix]="desktop"
              [nixpkgs-stable]="server"
              [home-manager-stable]="server"
              [catppuccin-stable]="server"
              [sops-nix-stable]="server"
              [nixos-needsreboot]="global"
              [darwin]="skip"
              [colmena]="skip"
              [flake-utils]="skip"
              [precommit-base]="skip"
            )

            root_inputs=$(echo "$new_lock" | jq -r '.nodes.root.inputs | keys[]')

            for input in $root_inputs; do
              node_name=$(echo "$new_lock" | jq -r ".nodes.root.inputs.\"$input\"")
              old_rev=$(echo "$old_lock" | jq -r ".nodes.\"$node_name\".locked.rev // .nodes.\"$node_name\".locked.narHash // empty" 2>/dev/null)
              new_rev=$(echo "$new_lock" | jq -r ".nodes.\"$node_name\".locked.rev // .nodes.\"$node_name\".locked.narHash // empty")

              if [ "$old_rev" != "$new_rev" ]; then
                category="${input_category[$input]:-global}"
                echo "  Input changed: $input → category: $category"

                case "$category" in
                  global)
                    global=true ;;
                  desktop)
                    desktop_global=true ;;
                  server)
                    server_global=true ;;
                  desktop+fredhub)
                    desktop_global=true
                    # Inject a synthetic machine path so fredhub is included
                    # in per-machine server filtering (downstream extracts the
                    # third path segment; sort -u deduplicates).
                    machine_files_arr+=("hosts/linux/fredhub/_input_change") ;;
                  skip)
                    echo "    (skipped — no Linux rebuild needed)" ;;
                esac
              fi

              # Short-circuit: if global is set, no point checking more inputs
              if [ "$global" = "true" ]; then
                echo "  global=true — skipping remaining inputs"
                break
              fi
            done
          elif [ "$flake_lock_changed" = "true" ] && [ "$global" = "true" ]; then
            echo ""
            echo "flake.lock changed but global already set — skipping input parsing"
          fi

          if [ ${#machine_files_arr[@]} -eq 0 ]; then
            machine_files="[]"
          else
            machine_files=$(printf '%s\n' "${machine_files_arr[@]}" | jq -R . | jq -cs .)
          fi

          echo "global=$global" >> "$GITHUB_OUTPUT"
          echo "desktop_global=$desktop_global" >> "$GITHUB_OUTPUT"
          echo "server_global=$server_global" >> "$GITHUB_OUTPUT"
          echo "machine_files=$machine_files" >> "$GITHUB_OUTPUT"

          echo ""
          echo "Change detection results:"
          echo "  global=$global"
          echo "  desktop_global=$desktop_global"
          echo "  server_global=$server_global"
          echo "  machine_files=$machine_files"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
        with:
          extra-conf: |
            access-tokens = github.com=${{ github.token }}

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false
          use-gha-cache: false

      - id: out
        shell: bash
        run: |
          echo "Evaluating nixosConfigurations..."

          all_systems=$(nix eval --json .#nixosConfigurations --apply builtins.attrNames)
          echo "All systems: $all_systems"

          desktop_names=("Daytona" "maranello")

          all_servers=()
          all_desktops=()

          for sys in $(jq -r '.[]' <<< "$all_systems"); do
            if [[ " ${desktop_names[*]} " == *" $sys "* ]]; then
              all_desktops+=("$sys")
            else
              all_servers+=("$sys")
            fi
          done

          # ------------------------------------------------------------------
          # Decide which systems actually need to be built.
          #
          # Rules:
          #   - workflow_dispatch → build everything
          #   - global flag set → build everything
          #   - server_global flag set → build all servers
          #   - desktop_global flag set → build all desktops
          #   - only hosts/linux/** changed (or synthetic input-change
          #     paths) → build only the machines whose directory appears
          #     in the diff
          #   - nothing relevant changed (e.g. only docs) → empty matrix;
          #     build jobs are skipped
          # ------------------------------------------------------------------

          event="${{ github.event_name }}"

          # Gather change-detection outputs (the step is skipped for
          # workflow_dispatch, so fall back to building everything).
          if [ "$event" = "workflow_dispatch" ]; then
            global_changed="true"
            desktop_global_changed="true"
            server_global_changed="true"
            machine_files="[]"
          else
            global_changed="${{ steps.changes.outputs.global }}"
            desktop_global_changed="${{ steps.changes.outputs.desktop_global }}"
            server_global_changed="${{ steps.changes.outputs.server_global }}"
            machine_files='${{ steps.changes.outputs.machine_files }}'
          fi

          if [ "$global_changed" = "true" ]; then
            echo "Building ALL systems (event=$event, global_changed=$global_changed)"
            filtered_servers=("${all_servers[@]}")
            filtered_desktops=("${all_desktops[@]}")
          else
            echo "Filtering to affected machines only (event=$event)"

            # Extract the third path segment (the machine dir name, always
            # lowercase) from every changed path under hosts/linux/**.
            # This includes both real file paths and synthetic entries
            # injected by the input-aware flake.lock parser.
            changed_machines=$(echo "$machine_files" \
              | jq -r '.[] | split("/")[2]' \
              | sort -u)

            echo "Changed machine dirs: $(echo "$changed_machines" | tr '\n' ' ')"

            # --- Servers ---
            if [ "$server_global_changed" = "true" ]; then
              echo "Server-global change detected — building all servers"
              filtered_servers=("${all_servers[@]}")
            else
              filtered_servers=()
              for sys in "${all_servers[@]}"; do
                # The nixosConfiguration attribute name may differ in case from
                # the directory name (e.g. "Daytona" lives in hosts/linux/daytona/).
                sys_lower=$(echo "$sys" | tr '[:upper:]' '[:lower:]')
                if echo "$changed_machines" | grep -qx "$sys_lower"; then
                  filtered_servers+=("$sys")
                fi
              done
            fi

            # --- Desktops ---
            # features/desktop is isolated from server systems — a change there
            # forces all desktops to rebuild but leaves the server list as-is.
            if [ "$desktop_global_changed" = "true" ]; then
              echo "Desktop-global change detected — building all desktops"
              filtered_desktops=("${all_desktops[@]}")
            else
              filtered_desktops=()
              for sys in "${all_desktops[@]}"; do
                sys_lower=$(echo "$sys" | tr '[:upper:]' '[:lower:]')
                if echo "$changed_machines" | grep -qx "$sys_lower"; then
                  filtered_desktops+=("$sys")
                fi
              done
            fi
          fi

          servers_json=$(printf '%s\n' "${filtered_servers[@]}" | jq -R . | jq -cs .)
          desktops_json=$(printf '%s\n' "${filtered_desktops[@]}" | jq -R . | jq -cs .)

          # printf with an empty array produces no output; jq -cs . on empty
          # stdin returns "[]" which is exactly what we want for an empty matrix.
          echo "servers=$servers_json"   >> "$GITHUB_OUTPUT"
          echo "desktops=$desktops_json" >> "$GITHUB_OUTPUT"

          echo "Servers to build:   $servers_json"
          echo "Desktops to build:  $desktops_json"

  # =====================================================================
  # Build server systems
  # =====================================================================
  build-servers:
    name: Build server systems
    runs-on: self-hosted
    needs: [skip-if-clean, find-systems]
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' && needs.find-systems.outputs.servers != '[]' }}
    permissions:
      id-token: "write"
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        system: ${{ fromJson(needs.find-systems.outputs.servers) }}

    steps:
      # - name: Free disk space
