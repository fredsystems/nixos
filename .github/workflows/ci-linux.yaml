---
name: CI (Linux)

on:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # =====================================================================
  # Fast-path: MUST ALWAYS RUN or downstream jobs will skip
  # =====================================================================
  skip-if-clean:
    name: Skip if merge_queue produces no diff
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Merge Queue CI Check Skipper
        id: merge-queue-ci-skipper
        uses: ./.github/merge-queue-ci-skipper
        with:
          secret: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Check merge_group synthetic commit
        id: check
        run: |
          # PR mode: never skip
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ steps.merge-queue-ci-skipper.outputs.skip-check }}" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # =====================================================================
  # Discover Linux systems
  # =====================================================================
  find-systems:
    name: Find Linux systems
    runs-on: ubuntu-latest
    needs: [skip-if-clean]
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }}

    outputs:
      servers: ${{ steps.out.outputs.servers }}
      desktops: ${{ steps.out.outputs.desktops }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Detect which top-level paths changed.
      # On non-PR events (merge_group, workflow_dispatch) this step is
      # skipped and we fall back to building every system below.
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # Return a JSON array of every file that matched the `machine`
          # filter so we can extract individual machine names later.
          list-files: json
          filters: |
            # Any path that is shared across machines forces a full rebuild.
            global:
              - 'flake.nix'
              - 'flake.lock'
              - 'modules/**'
              - 'profiles/**'
              - 'home-profiles/**'
              - 'features/**'
              - '!features/desktop/**'
              - 'dotfiles/**'
              - 'firmware.nix'
              - '.github/**'
              - '!.github/renovate.json5'
            # Changes isolated to desktop features — servers are unaffected.
            desktop_global:
              - 'features/desktop/**'
            # Machine-specific paths — we parse the dir names out of
            # `machine_files` when `global` is false.
            machine:
              - 'hosts/linux/**'

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false
          use-gha-cache: false

      - id: out
        shell: bash
        run: |
          echo "Evaluating nixosConfigurations..."

          all_systems=$(nix eval --json .#nixosConfigurations --apply builtins.attrNames)
          echo "All systems: $all_systems"

          desktop_names=("Daytona" "maranello")

          all_servers=()
          all_desktops=()

          for sys in $(jq -r '.[]' <<< "$all_systems"); do
            if [[ " ${desktop_names[*]} " == *" $sys "* ]]; then
              all_desktops+=("$sys")
            else
              all_servers+=("$sys")
            fi
          done

          # ------------------------------------------------------------------
          # Decide which systems actually need to be built.
          #
          # Rules:
          #   - workflow_dispatch or merge_group  → build everything (no PR
          #     context to diff against, or the merge commit may compound
          #     multiple PRs with different scopes)
          #   - pull_request + global path changed → build everything
          #   - pull_request + only systems-linux/** changed → build only the
          #     machines whose directory appears in the diff
          #   - pull_request + nothing relevant changed (e.g. only docs) →
          #     empty matrix; build jobs are skipped automatically
          # ------------------------------------------------------------------

          event="${{ github.event_name }}"
          global_changed="${{ steps.filter.outputs.global }}"
          desktop_global_changed="${{ steps.filter.outputs.desktop_global }}"

          if [ "$event" != "pull_request" ] || [ "$global_changed" = "true" ]; then
            echo "Building ALL systems (event=$event, global_changed=$global_changed)"
            filtered_servers=("${all_servers[@]}")
            filtered_desktops=("${all_desktops[@]}")
          else
            echo "PR with no global changes — filtering to affected machines only"

            # `steps.filter.outputs.machine_files` is a JSON array of every
            # changed path that matched hosts/linux/**.  Extract the third
            # path segment (the machine dir name, always lowercase) from each.
            machine_files='${{ steps.filter.outputs.machine_files }}'
            changed_machines=$(echo "$machine_files" \
              | jq -r '.[] | split("/")[2]' \
              | sort -u)

            echo "Changed machine dirs: $(echo "$changed_machines" | tr '\n' ' ')"

            filtered_servers=()
            filtered_desktops=()

            for sys in "${all_servers[@]}"; do
              # The nixosConfiguration attribute name may differ in case from
              # the directory name (e.g. "Daytona" lives in hosts/linux/daytona/).
              sys_lower=$(echo "$sys" | tr '[:upper:]' '[:lower:]')
              if echo "$changed_machines" | grep -qx "$sys_lower"; then
                filtered_servers+=("$sys")
              fi
            done

            # features/desktop is isolated from server systems — a change there
            # forces all desktops to rebuild but leaves the server list as-is.
            if [ "$desktop_global_changed" = "true" ]; then
              echo "Desktop-global change detected (features/desktop/**) — building all desktops"
              filtered_desktops=("${all_desktops[@]}")
            else
              for sys in "${all_desktops[@]}"; do
                sys_lower=$(echo "$sys" | tr '[:upper:]' '[:lower:]')
                if echo "$changed_machines" | grep -qx "$sys_lower"; then
                  filtered_desktops+=("$sys")
                fi
              done
            fi
          fi

          servers_json=$(printf '%s\n' "${filtered_servers[@]}" | jq -R . | jq -cs .)
          desktops_json=$(printf '%s\n' "${filtered_desktops[@]}" | jq -R . | jq -cs .)

          # printf with an empty array produces no output; jq -cs . on empty
          # stdin returns "[]" which is exactly what we want for an empty matrix.
          echo "servers=$servers_json"   >> "$GITHUB_OUTPUT"
          echo "desktops=$desktops_json" >> "$GITHUB_OUTPUT"

          echo "Servers to build:   $servers_json"
          echo "Desktops to build:  $desktops_json"

  # =====================================================================
  # Build server systems
  # =====================================================================
  build-servers:
    name: Build server systems
    runs-on: self-hosted
    needs: [skip-if-clean, find-systems]
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' && needs.find-systems.outputs.servers != '[]' }}
    permissions:
      id-token: "write"
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        system: ${{ fromJson(needs.find-systems.outputs.servers) }}

    steps:
      # - name: Free disk space
      #   run: |
      #     sudo rm -rf /usr/share/dotnet
      #     sudo rm -rf /opt/ghc
      #     sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      #     sudo docker image prune --all --force || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
        with:
          trust-runner-user: true
          extra-conf: |
            substituters = http://192.168.31.14/fred https://niri.cachix.org https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= fred:JjyhvRSvKfkk8r4HS0mS5r5I7dT4GociEFbrR9OgBZ0= niri.cachix.org-1:Wv0OmO7PsuocRKzfDoJ3mulSl7Z6oezYhGhR+3W2964=

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false
          use-gha-cache: false

      - name: Build server system
        shell: bash
        run: |
          set -euo pipefail

          error=0

          echo "Logging in..."
          nix shell nixpkgs#attic-client --command attic login fred http://192.168.31.14:8080 eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjIxNDgyMzMyODksIm5iZiI6MTc2OTU0MjA4OSwic3ViIjoiZnJlZCIsImh0dHBzOi8vand0LmF0dGljLnJzL3YxIjp7ImNhY2hlcyI6eyJmcmVkIjp7InIiOjEsInciOjEsImNjIjoxfX19fQ.WhR5ixdW0j-wV77Tl8VubJPEyEvgQ8nQWYbgJxI8pPiLJN6v4DVaqKPu15mcY0N0B0zKnq9-njG5EOn2Z2-4dMgfx9ttTA-lltxrvPf5nKR9zAXg6hgPYsnGQuRFBvAFzlfPCpcIU2rgEVzMajzjipQgfUnVPDuto9uPU1VG25fncVRYz5dUhOXTfvN_WWpzcgQ7HDHQufbui5IoG-nmFMFWcNkxTCw7XVNs1PYFpadMGn6zAeh9Hi6epYYllr1aTcmTCx6ut3-fbFdQaxGG_HsCyxFiIf9r6GNSQvZOeHbeLcE21RQ6qNrkKZuQiVoOAcQr7ngpQ2jjcWnajw_hCPi6rqByZxdZy8IAbPQ83nm9o5UlfKg99sr6YSV-6ZTBvsOm-ioUX9hSktWm3O7cdH74ygmbUC_QL-os6aYNhbyQjSEMgiOpS65VnFURG58gnnvVHncMvohyDKwZqcWVtiaQApNeL3_LEATtX_zdqlaWdCVXO3t3QlD0ebYVhb4rn2KEg0GOZHGpWPqJnszRSMwXgWM1fG37OF117Qz6O9280BoEMdjLvITr5Cq0kQqS0PzapLdI5maU6ZluyqvAvgqdHzwjey4hDDq3FjITA_JMUStRlH7sMwtaSGTiTTOHQPe7WT9PImqfm4G8Q3urOsHMBE_Au1dqnUz4Lq-yU4M

          : > build.stderr

          echo "Building server: ${{ matrix.system }}"
          nix build ".#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel" 2> >(tee build.stderr >&2)

          if grep -qE "evaluation warning:" build.stderr; then
            error=1
          fi

          echo "Pushing first result..."
          nix shell nixpkgs#attic-client --command attic push fred result --ignore-upstream-cache-filter -j 2

          : > build.stderr
          echo "Building home-manager for: ${{ matrix.system }}"
          nix build ".#nixosConfigurations.${{ matrix.system }}.config.home-manager.users.fred.home.activationPackage" 2> >(tee build.stderr >&2)

          if grep -qE "evaluation warning:" build.stderr; then
            error=1
          fi

          echo "Pushing second result..."
          nix shell nixpkgs#attic-client --command attic push fred result --ignore-upstream-cache-filter -j 2

          if [ "$error" -ne 0 ]; then
            echo "One or more warnings were detected during the build."

            echo "::error::Nix evaluation warnings detected"
            exit 1
          fi
  # =====================================================================
  # Build desktop systems
  # =====================================================================
  build-desktops:
    name: Build desktop systems
    runs-on: self-hosted
    needs: [skip-if-clean, find-systems]
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' && needs.find-systems.outputs.desktops != '[]' }}
    permissions:
      id-token: "write"
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        system: ${{ fromJson(needs.find-systems.outputs.desktops) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
        with:
          trust-runner-user: true
          extra-conf: |
            substituters = http://192.168.31.14/fred https://niri.cachix.org https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= fred:JjyhvRSvKfkk8r4HS0mS5r5I7dT4GociEFbrR9OgBZ0= niri.cachix.org-1:Wv0OmO7PsuocRKzfDoJ3mulSl7Z6oezYhGhR+3W2964=

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
        with:
          use-flakehub: false
          use-gha-cache: false

      - name: Build desktop system
        shell: bash
        run: |
          set -euo pipefail

          error=0

          echo "Logging in..."
          nix shell nixpkgs#attic-client --command attic login fred http://192.168.31.14:8080 eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjIxNDgyMzMyODksIm5iZiI6MTc2OTU0MjA4OSwic3ViIjoiZnJlZCIsImh0dHBzOi8vand0LmF0dGljLnJzL3YxIjp7ImNhY2hlcyI6eyJmcmVkIjp7InIiOjEsInciOjEsImNjIjoxfX19fQ.WhR5ixdW0j-wV77Tl8VubJPEyEvgQ8nQWYbgJxI8pPiLJN6v4DVaqKPu15mcY0N0B0zKnq9-njG5EOn2Z2-4dMgfx9ttTA-lltxrvPf5nKR9zAXg6hgPYsnGQuRFBvAFzlfPCpcIU2rgEVzMajzjipQgfUnVPDuto9uPU1VG25fncVRYz5dUhOXTfvN_WWpzcgQ7HDHQufbui5IoG-nmFMFWcNkxTCw7XVNs1PYFpadMGn6zAeh9Hi6epYYllr1aTcmTCx6ut3-fbFdQaxGG_HsCyxFiIf9r6GNSQvZOeHbeLcE21RQ6qNrkKZuQiVoOAcQr7ngpQ2jjcWnajw_hCPi6rqByZxdZy8IAbPQ83nm9o5UlfKg99sr6YSV-6ZTBvsOm-ioUX9hSktWm3O7cdH74ygmbUC_QL-os6aYNhbyQjSEMgiOpS65VnFURG58gnnvVHncMvohyDKwZqcWVtiaQApNeL3_LEATtX_zdqlaWdCVXO3t3QlD0ebYVhb4rn2KEg0GOZHGpWPqJnszRSMwXgWM1fG37OF117Qz6O9280BoEMdjLvITr5Cq0kQqS0PzapLdI5maU6ZluyqvAvgqdHzwjey4hDDq3FjITA_JMUStRlH7sMwtaSGTiTTOHQPe7WT9PImqfm4G8Q3urOsHMBE_Au1dqnUz4Lq-yU4M

          : > build.stderr

          echo "Building desktop: ${{ matrix.system }}"
          nix build ".#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel" 2> >(tee build.stderr >&2)

          if grep -qE "evaluation warning:" build.stderr; then
            error=1
          fi

          echo "Pushing first result..."
          nix shell nixpkgs#attic-client --command attic push fred result --ignore-upstream-cache-filter -j 2

          : > build.stderr
          echo "Building home-manager for: ${{ matrix.system }}"
          nix build ".#nixosConfigurations.${{ matrix.system }}.config.home-manager.users.fred.home.activationPackage" 2> >(tee build.stderr >&2)

          if grep -qE "evaluation warning:" build.stderr; then
            error=1
          fi

          echo "Pushing second result..."
          nix shell nixpkgs#attic-client --command attic push fred result --ignore-upstream-cache-filter -j 2

          if [ "$error" -ne 0 ]; then
            echo "One or more warnings were detected during the build."

            echo "::error::Nix evaluation warnings detected"
            exit 1
          fi

  # =====================================================================
  # Required summary check
  # =====================================================================
  build-linux-summary:
    name: Build Linux Summary
    runs-on: ubuntu-latest
    needs: [skip-if-clean, build-servers, build-desktops]
    if: ${{ always() }}

    steps:
      - name: Evaluate summary (skip or propagate failures)
        run: |
          # merge_queue fast-path
          if [ "${{ needs.skip-if-clean.outputs.skip }}" = "true" ]; then
            echo "Merge queue synthetic merge was clean — summary passing without builds."
            exit 0
          fi

          SERVERS="${{ needs.build-servers.result }}"
          DESKTOPS="${{ needs.build-desktops.result }}"

          echo "Servers result:   $SERVERS"
          echo "Desktops result:  $DESKTOPS"

          # A result of "skipped" means the matrix was empty (no systems in
          # scope for this PR) — that is a valid outcome, not a failure.
          if [ "$SERVERS" = "failure" ] || [ "$DESKTOPS" = "failure" ]; then
            echo "❌ One or more Linux builds failed."
            exit 1
          fi

          if [ "$SERVERS" = "cancelled" ] || [ "$DESKTOPS" = "cancelled" ]; then
            echo "❌ Build job was cancelled — treating as failure."
            exit 1
          fi

          echo "✅ All in-scope Linux systems built successfully (skipped systems were not affected by this PR)."
          exit 0
