---
name: Lint

on:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # =====================================================================
  # Fast-path job — now always runs, but only sets skip=true on merge_group
  # =====================================================================
  skip-if-clean:
    name: Skip if merge_queue produces no diff
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Merge Queue CI Check Skipper
        id: merge-queue-ci-skipper
        uses: ./.github/merge-queue-ci-skipper
        with:
          secret: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Check merge_group synthetic commit
        id: check
        run: |
          # PR mode: never skip
          if [ "${{ github.event_name }}" != "merge_group" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ steps.merge-queue-ci-skipper.outputs.skip-check }}" = "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # =====================================================================
  # Primary Lint job
  # =====================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [skip-if-clean]
    if: ${{ needs.skip-if-clean.outputs.skip != 'true' }} # <-- now valid in PRs

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run flake pre-commit hooks
        # Build the pre-commit-check derivation directly instead of entering
        # the dev shell. The dev shell pulls in `colmena` from its flake input
        # (not cached by cache.nixos.org), forcing CI to compile colmena and
        # all its Cargo dependencies on every run — which is both slow and
        # prone to transient crates.io 403s. The check derivation runs the
        # same hooks at build time without that dependency.
        run: nix build --no-link --print-build-logs .#checks.x86_64-linux.pre-commit-check

  # =====================================================================
  # Required Check Summary
  # =====================================================================
  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [skip-if-clean, lint]
    if: ${{ always() }}

    steps:
      - name: Evaluate summary
        run: |
          if [ "${{ needs.skip-if-clean.outputs.skip }}" = "true" ]; then
            echo "Merge queue noop — skipping lint."
            exit 0
          fi

          STATUS="${{ needs.lint.result }}"

          if [ "$STATUS" = "failure" ]; then
            echo "Lint failed"
            exit 1
          fi

          if [ "$STATUS" = "cancelled" ]; then
            echo "Lint cancelled"
            exit 1
          fi

          echo "Lint succeeded."
          exit 0
