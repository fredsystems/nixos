---
name: update-flakes

on:
  schedule:
    # Weekly auto-merge run for everything except the manual-merge inputs.
    - cron: "0 5 * * 0"
    # Monthly run for the manual-merge inputs (currently: nixpkgs-kernel).
    # Server kernel bumps require a planned reboot, so they get reviewed
    # by hand instead of riding the auto-merge train.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which input set to update"
        type: choice
        required: true
        default: "auto"
        options:
          - auto
          - manual
          - both

permissions:
  contents: write
  pull-requests: write

jobs:
  get-flake-inputs:
    name: Get Flake Inputs
    runs-on: ubuntu-latest
    outputs:
      flakes: ${{ steps.split.outputs.flakes }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: flake.lock
          persist-credentials: false

      - id: split
        # Build the matrix of flake inputs to update on this invocation.
        # Each entry carries the input name and its merge policy (auto vs
        # manual); inputs that should be skipped this invocation are
        # filtered out of the matrix entirely so they never appear as
        # jobs in the run summary.
        #
        # MANUAL_INPUTS is the single source of truth for which inputs
        # are held back from the weekly auto-merge run.
        env:
          MANUAL_INPUTS: '["nixpkgs-kernel"]'
          EVENT: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          run_auto=false
          run_manual=false
          case "$EVENT" in
            schedule)
              if [[ "$SCHEDULE" == "0 5 * * 0" ]]; then
                run_auto=true
              elif [[ "$SCHEDULE" == "0 6 1 * *" ]]; then
                run_manual=true
              fi
              ;;
            workflow_dispatch)
              case "$TARGET" in
                auto)   run_auto=true ;;
                manual) run_manual=true ;;
                both)   run_auto=true; run_manual=true ;;
              esac
              ;;
          esac

          flakes=$(jq -nc \
            --argjson all "$(jq -c '.nodes.root.inputs | keys' flake.lock)" \
            --argjson manual "$MANUAL_INPUTS" \
            --arg run_auto "$run_auto" \
            --arg run_manual "$run_manual" '
            $all
            | map(. as $name | {
                name: $name,
                kind: (if ($manual | index($name)) then "manual" else "auto" end)
              })
            | map(select(
                if .kind == "manual"
                then $run_manual == "true"
                else $run_auto   == "true"
                end))
          ')
          echo "flakes={\"include\": $flakes}" >> "$GITHUB_OUTPUT"

  update-flake:
    name: update-flake (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: get-flake-inputs

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-flake-inputs.outputs.flakes) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          ref: main

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: accept-flake-config = true

      - name: Configure Git identity
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "github[bot]"

      - uses: fredsystems/flake-update-action@76d4f6b1d4d924c9ff073075b685d96474fb87f2 # v3.0.4
        with:
          dependency: ${{ matrix.name }}
          pull-request-token: ${{ secrets.PAT }}
          pull-request-author: github[bot] <noreply@github.com>
          delete-branch: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-branch-prefix: update-
          automerge: ${{ matrix.kind == 'auto' }}
